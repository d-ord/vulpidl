name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run setup
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run setup
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run setup
      - run: npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: dist/*.dmg
